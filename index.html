<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gianluca AI - Il Mio Clone Digitale</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #eee;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 700px;
            height: 90vh;
            background: #16213e;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        /* HEADER */
        .header {
            background: linear-gradient(135deg, #0f3460, #533483);
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #e94560, #0f3460);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: bold;
            flex-shrink: 0;
        }

        .header-info h1 { font-size: 18px; font-weight: 600; }
        .header-info p  { font-size: 12px; color: #a0aec0; margin-top: 2px; }

        .status {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: #68d391;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #68d391;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.4; }
        }

        /* CHAT */
        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scrollbar-width: thin;
            scrollbar-color: #0f3460 transparent;
        }

        .message {
            display: flex;
            gap: 10px;
            max-width: 85%;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .message.user  { align-self: flex-end; flex-direction: row-reverse; }
        .message.bot   { align-self: flex-start; }

        .msg-avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }

        .message.bot  .msg-avatar { background: linear-gradient(135deg, #e94560, #0f3460); }
        .message.user .msg-avatar { background: linear-gradient(135deg, #533483, #0f3460); }

        .msg-content { display: flex; flex-direction: column; gap: 4px; }

        .message.user .msg-content { align-items: flex-end; }

        .bubble {
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.5;
        }

        .message.bot  .bubble {
            background: #0f3460;
            border-bottom-left-radius: 4px;
        }

        .message.user .bubble {
            background: linear-gradient(135deg, #533483, #e94560);
            border-bottom-right-radius: 4px;
        }

        .timestamp {
            font-size: 10px;
            color: #4a5568;
            padding: 0 4px;
        }

        /* TYPING */
        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 12px 16px;
            background: #0f3460;
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            width: fit-content;
        }

        .typing-indicator span {
            width: 7px;
            height: 7px;
            background: #a0aec0;
            border-radius: 50%;
            animation: bounce 1.2s infinite;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30%            { transform: translateY(-6px); }
        }

        /* INPUT */
        .input-area {
            padding: 16px 20px;
            background: #0f3460;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        #userInput {
            flex: 1;
            background: #16213e;
            border: 1px solid #1a365d;
            color: #eee;
            padding: 12px 16px;
            border-radius: 25px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        #userInput:focus { border-color: #533483; }
        #userInput::placeholder { color: #4a5568; }

        #sendBtn {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #533483, #e94560);
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
            flex-shrink: 0;
        }

        #sendBtn:hover    { transform: scale(1.1); }
        #sendBtn:active   { transform: scale(0.95); }
        #sendBtn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* WELCOME MESSAGE */
        .welcome {
            text-align: center;
            color: #4a5568;
            font-size: 13px;
            margin-top: auto;
            padding: 10px;
        }
    </style>
</head>
<body>
<div class="container">

    <div class="header">
        <div class="avatar">G</div>
        <div class="header-info">
            <h1>Gianluca AI</h1>
            <p>Il mio clone digitale personale</p>
        </div>
        <div class="status">
            <div class="status-dot"></div>
            Online
        </div>
    </div>

    <div class="chat-box" id="chatBox">
        <div class="welcome">Inizia una conversazione con Gianluca AI 👋</div>
    </div>

    <div class="input-area">
        <input
            type="text"
            id="userInput"
            placeholder="Scrivi un messaggio..."
            autocomplete="off"
        />
        <button id="sendBtn" onclick="sendMessage()">➤</button>
    </div>

</div>

<script>
const API_URL = 'https://gianluca-ai-ten.vercel.app/api';
const API_KEY = 'chiave-segreta-cambiami-123';

    // Username anonimo persistente
    const username = localStorage.getItem('username')
        || 'utente_' + Math.random().toString(36).slice(2, 7);
    localStorage.setItem('username', username);

    const chatBox   = document.getElementById('chatBox');
    const userInput = document.getElementById('userInput');
    const sendBtn   = document.getElementById('sendBtn');

    // Invio con tasto Enter
    userInput.addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) sendMessage();
    });

    function getTime() {
        return new Date().toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
    }

    function addMessage(text, sender) {
        const div = document.createElement('div');
        div.className = `message ${sender}`;
        div.innerHTML = `
            <div class="msg-avatar">${sender === 'bot' ? 'G' : '👤'}</div>
            <div class="msg-content">
                <div class="bubble">${text}</div>
                <span class="timestamp">${getTime()}</span>
            </div>`;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function showTyping() {
        const div = document.createElement('div');
        div.className = 'message bot';
        div.id = 'typing';
        div.innerHTML = `
            <div class="msg-avatar">G</div>
            <div class="typing-indicator">
                <span></span><span></span><span></span>
            </div>`;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function removeTyping() {
        const t = document.getElementById('typing');
        if (t) t.remove();
    }

    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        addMessage(text, 'user');
        userInput.value = '';
        sendBtn.disabled = true;
        showTyping();

        try {
            const res = await fetch(`${API_URL}/chat`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-API-Key': API_KEY
                },
                body: JSON.stringify({ text, user: username })
            });

            if (!res.ok) throw new Error(`Errore ${res.status}`);
            const data = await res.json();
            removeTyping();
            addMessage(data.response, 'bot');
        } catch (err) {
            removeTyping();
            addMessage('⚠️ Problema di connessione. Il server è attivo?', 'bot');
            console.error(err);
        } finally {
            sendBtn.disabled = false;
            userInput.focus();
        }
    }

    // Messaggio di benvenuto automatico
    window.onload = () => {
        setTimeout(() => addMessage('Ciao! Sono Gianluca AI 👋 Chiedimi qualcosa di me!', 'bot'), 500);
    };
</script>
</body>
</html>
